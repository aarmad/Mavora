<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#000"/>
  <!-- Head (top center) -->
  <rect x="35" y="5" width="30" height="28" fill="#FFD700"/>
  <!-- Body (full middle row) -->
  <rect x="5"  y="35" width="30" height="28" fill="#FFD700"/>
  <rect x="35" y="35" width="30" height="28" fill="#FFD700"/>
  <rect x="65" y="35" width="30" height="28" fill="#FFD700"/>
  <!-- Legs (left and right only) -->
  <rect x="5"  y="65" width="30" height="30" fill="#FFD700"/>
  <rect x="65" y="65" width="30" height="30" fill="#FFD700"/>
</svg>
